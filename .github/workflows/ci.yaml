name: Employee-Churn-app

on: push

jobs:
  checking-app:
    name: employee-churn-app-testing-and-packaging
    runs-on: ubuntu-latest
    steps:
    - name: checkout-code
      uses: actions/checkout@v6

    - name: install python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12.9

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

    - name: install dependencies
      run: |
        pip install -r requirements.txt

    - name: test-api's 
      env:
        DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
      run: |
        python -m unittest testing/test_routes.py

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PAT }}


    - name: build docker image
      if: success()
      run: | 
         docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction-app:latest .

    - name: push docker image
      run: | 
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction-app:latest

            docker stop churn-app || true
            docker rm churn-app || true

            docker run -d -p 80:8000 \
            -e DAGSHUB_PAT=${{ secrets.DAGSHUB_PAT }} \
            --name churn-app \
            ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction-app:latest
      